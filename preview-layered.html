<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketch2Code 分层还原预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }

        .toolbar {
            position: sticky; top: 0; z-index: 100;
            background: #1e293b; padding: 12px 24px;
            display: flex; align-items: center; gap: 16px;
            border-bottom: 1px solid #334155;
        }
        .toolbar h1 { font-size: 16px; color: #38bdf8; white-space: nowrap; }
        .toolbar select {
            padding: 6px 12px; background: #334155; color: #f1f5f9;
            border: 1px solid #475569; border-radius: 6px; font-size: 14px;
        }
        .toolbar .stats { margin-left: auto; font-size: 12px; color: #64748b; }
        .toolbar .stats b { color: #38bdf8; }

        .main { display: flex; height: calc(100vh - 49px); }

        /* 左侧: CSS可视化 */
        .preview-pane {
            flex: 1; overflow: auto; padding: 24px;
            display: flex; justify-content: center; align-items: flex-start;
        }
        .canvas-frame {
            background: #fff; position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.4); border-radius: 4px;
            transform-origin: top center;
        }

        /* 右侧: 源代码 */
        .code-pane {
            width: 45%; max-height: calc(100vh - 49px); overflow: auto;
            background: #0d1117; border-left: 1px solid #334155;
        }
        .code-tabs {
            display: flex; background: #161b22; border-bottom: 1px solid #334155;
            position: sticky; top: 0;
        }
        .code-tab {
            padding: 8px 16px; font-size: 13px; cursor: pointer;
            color: #8b949e; border-bottom: 2px solid transparent;
        }
        .code-tab.active { color: #f0f6fc; border-bottom-color: #38bdf8; background: #0d1117; }
        .code-content {
            padding: 16px; font-family: 'SF Mono', Menlo, monospace;
            font-size: 12px; line-height: 1.6; white-space: pre; color: #c9d1d9;
        }

        /* 加载状态 */
        .loading { text-align: center; padding: 100px 0; color: #475569; }
        .loading .dot { display: inline-block; animation: blink 1.4s infinite both; }
        .loading .dot:nth-child(2) { animation-delay: 0.2s; }
        .loading .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100% { opacity:0 } 40% { opacity:1 } }

        /* 缩放控制 */
        .zoom-control {
            display: flex; align-items: center; gap: 8px;
        }
        .zoom-control button {
            padding: 4px 10px; background: #334155; color: #94a3b8;
            border: 1px solid #475569; border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        .zoom-control button:hover { background: #475569; }
        .zoom-control span { font-size: 12px; color: #94a3b8; min-width: 40px; text-align: center; }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>🎨 Sketch2Code</h1>
        <select id="sel" onchange="load(this.value)">
            <option value="">加载中...</option>
        </select>
        <div class="zoom-control">
            <button onclick="setZoom(zoom-0.1)">−</button>
            <span id="zoomLabel">100%</span>
            <button onclick="setZoom(zoom+0.1)">+</button>
            <button onclick="setZoom(1)">1:1</button>
        </div>
        <div class="stats" id="stats"></div>
    </div>

    <div class="main">
        <div class="preview-pane" id="preview">
            <div class="loading">加载中<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
        </div>
        <div class="code-pane" id="codePane">
            <div class="code-tabs">
                <div class="code-tab active" onclick="showTab('vue')">Vue SFC</div>
                <div class="code-tab" onclick="showTab('css')">CSS</div>
                <div class="code-tab" onclick="showTab('html')">HTML</div>
            </div>
            <div class="code-content" id="codeContent"></div>
        </div>
    </div>

<script>
const FILES = [
    { label: '业绩达成-产渠道', file: '3-product-channel.vue' },
    { label: '业绩达成-渠道', file: '2-channel.vue' },
    { label: '业绩达成-机构', file: '1-organization.vue' },
];

let currentFile = '';
let currentSource = '';
let zoom = 1;
let currentTab = 'vue';

// 初始化下拉框
const sel = document.getElementById('sel');
sel.innerHTML = FILES.map(f => `<option value="${f.file}">${f.label}</option>`).join('');

async function load(file) {
    if (!file) return;
    currentFile = file;
    const preview = document.getElementById('preview');

    try {
        const resp = await fetch(`./output/layered-test/${file}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        currentSource = await resp.text();
    } catch (e) {
        preview.innerHTML = `<div class="loading">加载失败: ${e.message}</div>`;
        return;
    }

    // 解析SFC
    const templateHtml = extractSection(currentSource, 'template');
    const scriptCode = extractSection(currentSource, 'script');
    const styleCode = extractSection(currentSource, 'style');

    // 统计
    const classes = (styleCode.match(/\.\w[\w-]*\s*\{/g) || []).length;
    const colors = (styleCode.match(/#[0-9a-fA-F]{6}/g) || []);
    const uniqueColors = [...new Set(colors)].length;
    const flexCount = (styleCode.match(/display:\s*flex/g) || []).length;

    document.getElementById('stats').innerHTML =
        `类名 <b>${classes}</b> | 颜色 <b>${uniqueColors}</b> | flex <b>${flexCount}</b> | <b>${(currentSource.length/1024).toFixed(1)}KB</b>`;

    // CSS可视化预览: 把CSS和HTML直接渲染
    preview.innerHTML = `<div class="canvas-frame" id="frame"><style>${styleCode}</style>${templateHtml}</div>`;
    applyZoom();
    showTab(currentTab);
}

function extractSection(source, tag) {
    const re = new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`);
    const m = source.match(re);
    return m ? m[1].trim() : '';
}

function setZoom(z) {
    zoom = Math.max(0.1, Math.min(2, z));
    applyZoom();
}

function applyZoom() {
    const frame = document.getElementById('frame');
    if (!frame) return;
    frame.style.transform = `scale(${zoom})`;
    document.getElementById('zoomLabel').textContent = Math.round(zoom * 100) + '%';
}

function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.code-tab').forEach((el, i) => {
        el.classList.toggle('active', ['vue','css','html'][i] === tab);
    });

    const content = document.getElementById('codeContent');
    if (tab === 'vue') content.textContent = currentSource;
    else if (tab === 'css') content.textContent = extractSection(currentSource, 'style');
    else content.textContent = extractSection(currentSource, 'template');
}

// 自动加载第一个
load(FILES[0].file);
</script>
</body>
</html>
