<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sketch2code 预览</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; }
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: #1e293b; color: white; padding: 10px 20px;
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .toolbar button {
      padding: 6px 16px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-size: 13px;
    }
    .toolbar button.active { background: #3b82f6; border-color: #3b82f6; }
    .toolbar .title { font-weight: 700; margin-right: 10px; color: #60a5fa; }
    .preview-container {
      margin-top: 50px; padding: 20px; display: flex;
      justify-content: center; align-items: flex-start;
    }
    .preview-frame {
      background: white; box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      border-radius: 8px; overflow: hidden;
      position: relative;
    }
    .preview-frame iframe { border: none; display: block; }
    .stats {
      position: fixed; bottom: 10px; right: 10px;
      background: rgba(0,0,0,0.75); color: #94a3b8;
      padding: 6px 12px; border-radius: 6px; font-size: 11px; z-index: 999;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="title">sketch2code 预览</span>
    <span id="tab-buttons"></span>
    <button onclick="toggleScale()" id="scaleBtn">🔍 缩放: 1:1</button>
  </div>
  <div class="preview-container" id="container">
    <div class="preview-frame" id="frame-wrapper">
      <iframe id="preview-frame" style="width:100%;height:100vh;"></iframe>
    </div>
  </div>
  <div class="stats" id="stats">加载中...</div>

<script>
const pages = [
  { name: '🚀 Qwen VLM 产渠道', file: './output/qwen-vlm/1-3-1-0业绩达成-产渠道.vue', w: 1280, h: 1126 },
  { name: '🚀 Qwen VLM 渠道', file: './output/qwen-vlm/2-2-1-0业绩达成-渠道.vue', w: 1280, h: 1098 },
  { name: '🚀 Qwen VLM 机构', file: './output/qwen-vlm/3-1-1-0业绩达成-机构.vue', w: 1280, h: 818 },
];

let currentPage = 0;
let currentScale = 1;

// Generate tab buttons dynamically
function initTabs() {
  const container = document.getElementById('tab-buttons');
  pages.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.textContent = p.name;
    btn.className = i === 0 ? 'active' : '';
    btn.onclick = () => switchPage(i);
    container.appendChild(btn);
  });
}

async function loadPage(idx) {
  currentPage = idx;
  document.querySelectorAll('.toolbar button').forEach((b,i) => b.classList.toggle('active', i === idx));
  const page = pages[idx];
  const resp = await fetch(page.file);
  const sfc = await resp.text();

  // Parse SFC
  const tm = sfc.match(/<template>([\s\S]*?)<\/template>/);
  const sm = sfc.match(/<style[^>]*>([\s\S]*?)<\/style>/);
  const template = tm ? tm[1] : '';
  const style = sm ? sm[1] : '';

  const html = buildHTML(template, style, page.w, page.h);
  const frame = document.getElementById('preview-frame');
  const blob = new Blob([html], { type: 'text/html' });
  frame.src = URL.createObjectURL(blob);

  const wrapper = document.getElementById('frame-wrapper');
  wrapper.style.width = (page.w * currentScale) + 'px';
  frame.style.width = (page.w * currentScale) + 'px';
  frame.style.height = (page.h * currentScale + 10) + 'px';

  document.getElementById('stats').textContent =
    `${page.name} | ${page.w}×${page.h}px | ${sfc.length.toLocaleString()} chars | scale: ${currentScale.toFixed(1)}x`;
}

function buildHTML(template, style, w, h) {
  return `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;overflow:auto;}
${style}
</style></head><body style="width:${w}px;height:${h}px;transform-origin:0 0;transform:scale(${currentScale})">
${template}
</body></html>`;
}

function switchPage(idx) { loadPage(idx); }
function toggleScale() {
  currentScale = currentScale === 1 ? 0.5 : currentScale === 0.5 ? 0.25 : 1;
  document.getElementById('scaleBtn').textContent =
    '🔍 缩放: ' + (currentScale === 1 ? '1:1' : currentScale === 0.5 ? '1:2' : '1:4');
  loadPage(currentPage);
}

initTabs();
loadPage(0);
</script>
</body>
</html>
